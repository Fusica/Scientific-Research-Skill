schema_version: 1
profile_id: cs-ml-robotics-baseline
status: needs_personalization
active_by_default: false
scope:
  - machine_learning
  - reinforcement_learning
  - large_language_models
  - robotics
  - uav_control
required_capture:
  code:
    - repository_commit
    - dirty_state
    - entrypoint
    - configuration_hash
  data_or_environment:
    - identifier
    - version
    - split_or_scenario
  execution:
    - seed_or_randomization_record
    - hardware
    - software_environment
    - outputs
  claims:
    - closest_work_delta
    - statistical_unit
    - uncertainty
    - limitations
questions_to_freeze:
  reinforcement_learning:
    - evaluation_episode_and_seed_policy
    - statistical_unit_and_aggregation
    - sample_efficiency_and_compute_reporting
    - environment_version_and_determinism
  large_language_models:
    - model_tokenizer_and_decoding_versions
    - data_lineage_and_contamination_checks
    - judge_bias_and_human_evaluation
    - cost_latency_and_closed_model_boundaries
  robotics_and_uav:
    - dynamics_estimator_and_control_assumptions
    - simulator_middleware_and_firmware_versions
    - sensor_noise_latency_and_ground_truth_uncertainty
    - safety_hil_real_flight_and_sim_to_real_gates
prohibited_defaults:
  - universal_seed_count
  - universal_variance_threshold
  - universal_baseline_improvement_threshold
  - citation_count_as_novelty
