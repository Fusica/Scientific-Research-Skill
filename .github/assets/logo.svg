      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="gate-gradient" x1="226" y1="188" x2="350" y2="326" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#logo-bg)" stroke="#334155" stroke-width="8"/>
