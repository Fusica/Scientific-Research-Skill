<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Scientific Research Skill logo</title>
  <desc id="logo-desc">A trace rises from stacked evidence, passes through a human approval gate, and ends at a verified checkpoint.</desc>
  <defs>
    <linearGradient id="logo-bg" x1="66" y1="48" x2="450" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111C34"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="trace-gradient" x1="118" y1="388" x2="422" y2="98" gradientUnits="userSpaceOnUse">
