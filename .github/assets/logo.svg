    <rect x="111" y="294" width="150" height="46" rx="15" fill="#15243C" stroke="#818CF8" stroke-width="7"/>
    <circle cx="137" cy="317" r="7" fill="#FBBF24"/>
    <path d="M157 317H226" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
