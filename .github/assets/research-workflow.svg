<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" role="img" aria-labelledby="workflow-title workflow-desc">
  <title id="workflow-title">Traceable scientific research workflow</title>
  <desc id="workflow-desc">Six policy stages run from idea and literature through method, experiment and result synthesis, paper, and revision. Four explicit human gates control the main path. Researchctl records state, artifact pointers, gate decisions, and checkpoints. Hooks enforce only mechanical boundaries.</desc>
  <defs>
    <linearGradient id="canvas-bg" x1="0" y1="0" x2="1600" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1426"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="stage-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17243A"/>
      <stop offset="1" stop-color="#101B2E"/>
    </linearGradient>
    <linearGradient id="experiment-bg" x1="706" y1="220" x2="990" y2="398" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#132238"/>
      <stop offset="1" stop-color="#121A32"/>
    </linearGradient>
    <filter id="card-shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0 0L10 5L0 10Z" fill="#38BDF8"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0 0L10 5L0 10Z" fill="#94A3B8"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .eyebrow { fill: #38BDF8; font-size: 16px; font-weight: 700; letter-spacing: 2.7px; }
      .title { fill: #F8FAFC; font-size: 38px; font-weight: 760; letter-spacing: -0.5px; }
      .subtitle { fill: #A9B8CC; font-size: 18px; font-weight: 450; }
      .stage-index { fill: #07111F; font-size: 16px; font-weight: 800; text-anchor: middle; }
      .stage-name { fill: #F8FAFC; font-size: 21px; font-weight: 720; text-anchor: middle; }
      .stage-note { fill: #A9B8CC; font-size: 14px; font-weight: 500; text-anchor: middle; }
      .gate-label { fill: #F8FAFC; font-size: 13px; font-weight: 700; text-anchor: middle; }
      .gate-human { fill: #FBBF24; font-size: 10px; font-weight: 800; letter-spacing: 1.25px; text-anchor: middle; }
      .gate-label-tight { fill: #F8FAFC; font-size: 11px; font-weight: 700; text-anchor: middle; }
      .gate-human-tight { fill: #FBBF24; font-size: 9px; font-weight: 800; letter-spacing: 1px; text-anchor: middle; }
      .lane-label { fill: #94A3B8; font-size: 12px; font-weight: 800; letter-spacing: 2px; }
      .trace-pill { fill: #DCE7F5; font-size: 12px; font-weight: 650; text-anchor: middle; }
      .panel-title { fill: #F8FAFC; font-size: 18px; font-weight: 740; }
      .panel-body { fill: #B8C6D9; font-size: 14px; font-weight: 500; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .small-caps { fill: #FBBF24; font-size: 11px; font-weight: 800; letter-spacing: 1.2px; }
    </style>
  </defs>

  <rect x="8" y="8" width="1584" height="904" rx="30" fill="url(#canvas-bg)" stroke="#23324A" stroke-width="2"/>
  <circle cx="1481" cy="69" r="170" fill="#4F46E5" opacity="0.08"/>
  <circle cx="125" cy="833" r="210" fill="#0891B2" opacity="0.07"/>

  <text x="72" y="58" class="eyebrow">SCIENTIFIC RESEARCH SKILL</text>
  <text x="72" y="99" class="title">Trace decisions from idea to revision</text>
  <text x="72" y="131" class="subtitle">一套 policy · 六个阶段 · 四个人工 Gate · 每次回流都保留证据</text>

  <text x="72" y="186" class="lane-label">RESEARCH PATH</text>
  <g fill="none" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-cyan)">
    <path d="M378 305H410"/>
    <path d="M450 305H479"/>
    <path d="M619 305H650"/>
    <path d="M690 305H706"/>
    <path d="M990 305H1010"/>
    <path d="M1050 305H1070"/>
    <path d="M1206 305H1230"/>
    <path d="M1270 305H1287"/>
  </g>
  <path d="M204 305H226" fill="none" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" marker-start="url(#arrow-cyan)" marker-end="url(#arrow-cyan)"/>

  <rect x="72" y="194" width="306" height="24" rx="12" fill="#10263B" stroke="#28516C"/>
  <text x="225" y="211" class="stage-note">G1 共备：idea card + evidence base</text>

  <g filter="url(#card-shadow)">
    <rect x="72" y="222" width="124" height="166" rx="22" fill="url(#stage-top)" stroke="#31415B" stroke-width="2"/>
    <circle cx="134" cy="260" r="18" fill="#38BDF8"/>
    <text x="134" y="266" class="stage-index">1</text>
    <text x="134" y="310" class="stage-name">Idea</text>
    <text x="134" y="340" class="stage-note">立题与候选</text>
    <text x="134" y="361" class="stage-note">falsifiable</text>
  </g>

  <g filter="url(#card-shadow)">
    <rect x="234" y="222" width="144" height="166" rx="22" fill="url(#stage-top)" stroke="#31415B" stroke-width="2"/>
    <circle cx="306" cy="260" r="18" fill="#38BDF8"/>
    <text x="306" y="266" class="stage-index">2</text>
    <text x="306" y="310" class="stage-name">Literature</text>
    <text x="306" y="340" class="stage-note">文献与证据</text>
    <text x="306" y="361" class="stage-note">closest work</text>
  </g>
  <g>
    <text x="430" y="273" class="gate-human">G1</text>
    <path d="M430 281L454 305L430 329L406 305Z" fill="#F59E0B" stroke="#FDE68A" stroke-width="3"/>
    <circle cx="430" cy="300" r="5" fill="#07111F"/>
    <path d="M421 314C422 307 425 304 430 304C435 304 438 307 439 314" fill="none" stroke="#07111F" stroke-width="4" stroke-linecap="round"/>
    <text x="430" y="351" class="gate-label mono">idea_freeze</text>
    <text x="430" y="370" class="gate-human">HUMAN GATE</text>
  </g>

  <g filter="url(#card-shadow)">
    <rect x="479" y="222" width="140" height="166" rx="22" fill="url(#stage-top)" stroke="#31415B" stroke-width="2"/>
    <circle cx="549" cy="260" r="18" fill="#38BDF8"/>
    <text x="549" y="266" class="stage-index">3</text>
    <text x="549" y="310" class="stage-name">Method</text>
    <text x="549" y="340" class="stage-note">方法契约</text>
    <text x="549" y="361" class="stage-note">predictions</text>
  </g>

  <g>
    <text x="670" y="273" class="gate-human">G2</text>
    <path d="M670 281L694 305L670 329L646 305Z" fill="#F59E0B" stroke="#FDE68A" stroke-width="3"/>
    <circle cx="670" cy="300" r="5" fill="#07111F"/>
    <path d="M661 314C662 307 665 304 670 304C675 304 678 307 679 314" fill="none" stroke="#07111F" stroke-width="4" stroke-linecap="round"/>
    <text x="664" y="349" class="gate-label-tight">Method + exp.</text>
    <text x="664" y="365" class="gate-label-tight">approval</text>
    <text x="664" y="382" class="gate-human-tight">HUMAN GATE</text>
  </g>

  <g filter="url(#card-shadow)">
    <rect x="706" y="206" width="284" height="198" rx="24" fill="url(#experiment-bg)" stroke="#4F5E78" stroke-width="2"/>
    <circle cx="848" cy="242" r="18" fill="#38BDF8"/>
    <text x="848" y="248" class="stage-index">4</text>
    <text x="778" y="290" class="stage-name">Experiment</text>
    <text x="918" y="290" class="stage-name">Synthesis</text>
    <text x="778" y="320" class="stage-note">实验执行 · runs</text>
    <text x="918" y="320" class="stage-note">证据综合 · claims</text>
    <path d="M834 307H860" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-cyan)"/>
    <rect x="733" y="347" width="230" height="32" rx="16" fill="#0B1628" stroke="#32425C"/>
    <text x="848" y="368" class="stage-note">retain negative + excluded evidence</text>
  </g>

  <g>
    <text x="1030" y="273" class="gate-human">G3</text>
    <path d="M1030 281L1054 305L1030 329L1006 305Z" fill="#F59E0B" stroke="#FDE68A" stroke-width="3"/>
    <circle cx="1030" cy="300" r="5" fill="#07111F"/>
    <path d="M1021 314C1022 307 1025 304 1030 304C1035 304 1038 307 1039 314" fill="none" stroke="#07111F" stroke-width="4" stroke-linecap="round"/>
    <text x="1030" y="351" class="gate-label">Claim freeze</text>
    <text x="1030" y="370" class="gate-human">HUMAN GATE</text>
  </g>

  <g filter="url(#card-shadow)">
    <rect x="1070" y="222" width="136" height="166" rx="22" fill="url(#stage-top)" stroke="#31415B" stroke-width="2"/>
    <circle cx="1138" cy="260" r="18" fill="#38BDF8"/>
    <text x="1138" y="266" class="stage-index">5</text>
    <text x="1138" y="310" class="stage-name">Paper</text>
    <text x="1138" y="340" class="stage-note">论文与投稿</text>
    <text x="1138" y="361" class="stage-note">claim + render</text>
  </g>

  <g>
    <text x="1250" y="273" class="gate-human">G4</text>
    <path d="M1250 281L1274 305L1250 329L1226 305Z" fill="#F59E0B" stroke="#FDE68A" stroke-width="3"/>
    <circle cx="1250" cy="300" r="5" fill="#07111F"/>
    <path d="M1241 314C1242 307 1245 304 1250 304C1255 304 1258 307 1259 314" fill="none" stroke="#07111F" stroke-width="4" stroke-linecap="round"/>
    <text x="1250" y="351" class="gate-label mono">release</text>
    <text x="1250" y="370" class="gate-human">HUMAN GATE</text>
  </g>

  <g filter="url(#card-shadow)">
    <rect x="1287" y="222" width="154" height="166" rx="22" fill="url(#stage-top)" stroke="#31415B" stroke-width="2"/>
    <circle cx="1364" cy="260" r="18" fill="#38BDF8"/>
    <text x="1364" y="266" class="stage-index">6</text>
    <text x="1364" y="310" class="stage-name">Revision</text>
    <text x="1364" y="340" class="stage-note">返修闭环</text>
    <text x="1364" y="361" class="stage-note">verify first</text>
  </g>

  <rect x="1056" y="396" width="385" height="52" rx="17" fill="#231D18" stroke="#705322"/>
  <text x="1248" y="414" class="gate-human">SAME GATE · TWO TARGETS</text>
  <text x="1248" y="436" class="gate-label-tight mono">Paper: initial_submission · Revision: revision_rebuttal</text>

  <path d="M1364 452C1364 482 1220 488 1106 470C946 442 740 467 626 473C472 482 306 468 306 402"
        fill="none" stroke="#94A3B8" stroke-width="3" stroke-dasharray="9 10" stroke-linecap="round" marker-end="url(#arrow-slate)"/>
  <text x="847" y="490" class="stage-note">返修发现新证据或方法问题时，统一回流并重开受影响的 Gate</text>

  <text x="72" y="514" class="lane-label">EVIDENCE TRACE</text>
  <path d="M116 559H1435" stroke="#263750" stroke-width="8" stroke-linecap="round"/>
  <path d="M116 559H1435" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" opacity="0.92"/>
  <g>
    <circle cx="125" cy="559" r="8" fill="#FBBF24"/>
    <circle cx="334" cy="559" r="8" fill="#38BDF8"/>
    <circle cx="543" cy="559" r="8" fill="#38BDF8"/>
    <circle cx="752" cy="559" r="8" fill="#38BDF8"/>
    <circle cx="961" cy="559" r="8" fill="#38BDF8"/>
    <circle cx="1170" cy="559" r="8" fill="#38BDF8"/>
    <circle cx="1379" cy="559" r="8" fill="#818CF8"/>
  </g>
  <g>
    <rect x="76" y="578" width="98" height="30" rx="15" fill="#12233A"/><text x="125" y="598" class="trace-pill mono">IDEA IDs</text>
    <rect x="279" y="578" width="110" height="30" rx="15" fill="#12233A"/><text x="334" y="598" class="trace-pill mono">EVD / SRC</text>
    <rect x="481" y="578" width="124" height="30" rx="15" fill="#12233A"/><text x="543" y="598" class="trace-pill mono">PRED / SPEC</text>
    <rect x="680" y="578" width="144" height="30" rx="15" fill="#12233A"/><text x="752" y="598" class="trace-pill mono">RUN / ANALYSIS</text>
    <rect x="897" y="578" width="128" height="30" rx="15" fill="#12233A"/><text x="961" y="598" class="trace-pill mono">CLAIM LEDGER</text>
    <rect x="1108" y="578" width="124" height="30" rx="15" fill="#12233A"/><text x="1170" y="598" class="trace-pill mono">PAPER MAP</text>
    <rect x="1314" y="578" width="130" height="30" rx="15" fill="#12233A"/><text x="1379" y="598" class="trace-pill mono">REVISION MAP</text>
  </g>
  <text x="72" y="635" class="panel-body">Stable IDs, versions, paths, and hashes connect each claim to retained evidence.</text>

  <text x="72" y="686" class="lane-label">CONTROL PLANE</text>
  <g filter="url(#card-shadow)">
    <rect x="72" y="708" width="398" height="144" rx="22" fill="#101B2E" stroke="#405273" stroke-width="2"/>
    <rect x="93" y="729" width="50" height="50" rx="14" fill="#4F46E5"/>
    <path d="M106 746L115 754L106 762M121 763H132" fill="none" stroke="#F8FAFC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="161" y="747" class="small-caps">ONLY SUPPORTED WRITER · 唯一状态写入口</text>
    <text x="161" y="776" class="panel-title mono">researchctl</text>
    <text x="93" y="812" class="panel-body">Artifacts  •  Gate commands  •  checkpoints</text>
    <text x="93" y="834" class="panel-body">Records pointers + hashes; approval stays explicit.</text>
  </g>

  <path d="M470 780H520" stroke="#818CF8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-cyan)"/>
  <text x="495" y="767" class="stage-note">writes</text>

  <g filter="url(#card-shadow)">
    <rect x="520" y="708" width="430" height="144" rx="22" fill="#101B2E" stroke="#405273" stroke-width="2"/>
    <path d="M548 738H578L590 750V794H548Z" fill="#122E49" stroke="#38BDF8" stroke-width="3" stroke-linejoin="round"/>
    <path d="M578 738V751H590" fill="none" stroke="#38BDF8" stroke-width="3"/>
    <text x="610" y="748" class="small-caps">LOCAL PROJECT STATE</text>
    <text x="610" y="776" class="panel-title mono">.research/state.json</text>
    <text x="548" y="812" class="panel-body mono">current_stage  •  gates  •  artifact pointers</text>
    <text x="548" y="834" class="panel-body mono">decision history  •  last_checkpoint</text>
  </g>

  <path d="M950 780H1000" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-slate)"/>
  <text x="975" y="767" class="stage-note">reads</text>

  <g filter="url(#card-shadow)">
    <rect x="1000" y="708" width="528" height="144" rx="22" fill="#101B2E" stroke="#405273" stroke-width="2"/>
    <path d="M1031 738L1056 728L1081 738V758C1081 778 1071 791 1056 800C1041 791 1031 778 1031 758Z" fill="#182943" stroke="#FBBF24" stroke-width="3"/>
    <path d="M1044 759L1053 768L1069 749" fill="none" stroke="#F8FAFC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1101" y="747" class="small-caps">MECHANICAL BOUNDARIES ONLY · 仅机械边界</text>
    <text x="1101" y="776" class="panel-title">Hooks</text>
    <text x="1031" y="812" class="panel-body">Context, supported-tool denies, schema / pointer checks.</text>
    <text x="1031" y="834" class="panel-body">Do not certify novelty, validity, or paper quality.</text>
  </g>

  <text x="800" y="884" class="stage-note">Human judgment remains explicit. Failed, null, excluded, and contradictory evidence stays visible.</text>
</svg>
